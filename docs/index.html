<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' https://www.twse.com.tw https://www.tpex.org.tw; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src https://www.twse.com.tw https://www.tpex.org.tw;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>損益統計</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero-card">
        <div class="hero-copy">
          <p class="eyebrow">GitHub Pages Edition</p>
          <h1>損益統計</h1>
          <p class="hero-note">資料儲存在目前瀏覽器的 localStorage，可匯出成 JSON 備份。</p>
        </div>
        <div class="file-info">
          <span>資料位置</span>
          <strong id="filePath">Browser localStorage</strong>
        </div>
      </section>

      <section class="toolbar">
        <div class="toolbar-fields">
          <label class="field">
            <span>股票代碼</span>
            <input id="stockCode" type="text" maxlength="6" placeholder="2330、00878、00991A" />
          </label>

          <label class="field">
            <span>股票購入股數</span>
            <input id="shares" type="number" min="1" step="1" placeholder="1000" />
          </label>
        </div>

        <div class="actions">
          <button id="saveButton" class="action primary" type="button">新增庫存股票</button>
          <button id="removeButton" class="action danger" type="button">移除個股庫存</button>
          <button id="summaryButton" class="action secondary" type="button">統計損益</button>
        </div>

        <div class="actions utility-actions">
          <button id="exportButton" class="action utility" type="button">匯出資料</button>
          <label class="action utility file-action" for="importFile">匯入資料</label>
          <input id="importFile" type="file" accept="application/json,.json" hidden />
          <button id="clearButton" class="action utility ghost" type="button">清空庫存</button>
        </div>
      </section>

      <section class="content-grid">
        <article class="panel">
          <header class="panel-head">
            <h2>庫存股票現價</h2>
            <p>股票代號、股名、股數、最新收盤價</p>
          </header>

          <div class="table-shell">
            <table>
              <thead>
                <tr>
                  <th>股票代號</th>
                  <th>股名</th>
                  <th>股數</th>
                  <th>收盤價</th>
                </tr>
              </thead>
              <tbody id="currentPriceBody">
                <tr class="empty-row">
                  <td colspan="4">尚未統計。</td>
                </tr>
              </tbody>
            </table>
          </div>
        </article>

        <article class="panel">
          <header class="panel-head">
            <h2>個股獲利</h2>
            <p>漲跌值與個股獲利，依獲利高低排序</p>
          </header>

          <div class="table-shell">
            <table>
              <thead>
                <tr>
                  <th>股票代號</th>
                  <th>漲跌值</th>
                  <th>個股獲利</th>
                </tr>
              </thead>
              <tbody id="profitBody">
                <tr class="empty-row">
                  <td colspan="3">尚未統計。</td>
                </tr>
              </tbody>
            </table>
          </div>
        </article>

        <article class="panel summary-panel">
          <header class="panel-head">
            <h2>庫存總損益</h2>
            <p>全部庫存股的今日總獲利</p>
          </header>

          <div class="summary-box">
            <div id="totalProfit" class="summary-value neutral">0.00</div>
            <div id="summaryMeta" class="summary-meta">等待統計</div>
          </div>
        </article>
      </section>

      <footer class="status-bar">
        <span id="statusText">準備完成</span>
      </footer>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
